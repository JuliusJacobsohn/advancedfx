name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  merge_group:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to create or update. Defaults to the hlae/CMakeLists.txt version."
        required: false
        type: string
      publish_release:
        description: "Publish the build outputs to a GitHub Release."
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-2022
    env:
      CMAKE_EXE: C:\Program Files\CMake\bin\cmake.exe
    outputs:
      release_tag: ${{ steps.release_tag.outputs.tag_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          check-latest: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - uses: MinoruSekine/setup-scoop@v4

      - name: Install build prerequisites
        run: |
          scoop install gettext
          rustup toolchain install stable-x86_64-pc-windows-msvc
          rustup default stable-x86_64-pc-windows-msvc
          rustup target add i686-pc-windows-msvc
          py -3 -m pip install polib
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify Visual Studio 2022
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -products * -latest -version "[17.0,18.0)" -requires Microsoft.Component.MSBuild -property installationPath
          if ([string]::IsNullOrWhiteSpace($vsPath)) {
            throw "Visual Studio 2022 with MSBuild was not found on this runner."
          }

          Write-Host "Visual Studio installation: $vsPath"

      - name: Create build directory
        run: '& "$env:CMAKE_EXE" -E make_directory "${{github.workspace}}/build/Release"'

      - name: CMake - Configure
        working-directory: "${{github.workspace}}/build/Release"
        run: '& "$env:CMAKE_EXE" -DCMAKE_BUILD_TYPE=Release -G "Visual Studio 17 2022" -T "v143" -A "Win32" ../..'

      - name: CMake - Build
        working-directory: "${{github.workspace}}/build/Release"
        run: '& "$env:CMAKE_EXE" --build . --config Release -v -- -r'

      - name: CMake - Install and package
        working-directory: "${{github.workspace}}/build/Release"
        run: '& "$env:CMAKE_EXE" --install . --config Release -v'

      - name: Validate release package
        run: |
          $requiredFiles = @(
            "${{ github.workspace }}\build\Release\dist\bin\HLAE.exe",
            "${{ github.workspace }}\build\Release\dist\hlae.zip",
            "${{ github.workspace }}\build\Release\dist\hlae_pdb.zip",
            "${{ github.workspace }}\build\Release\dist\HLAE_Setup.exe"
          )

          foreach ($path in $requiredFiles) {
            if (-not (Test-Path -LiteralPath $path)) {
              throw "Required release output is missing: $path"
            }
          }

          Get-ChildItem "${{ github.workspace }}\build\Release\dist" -File |
            Select-Object Name, Length |
            Format-Table -AutoSize

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: hlae-release-package
          path: |
            build/Release/dist/HLAE_Setup.exe
            build/Release/dist/hlae.zip
            build/Release/dist/hlae_pdb.zip
          if-no-files-found: error

      - name: Resolve release tag
        id: release_tag
        if: github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
        run: |
          $inputTag = "${{ inputs.tag_name }}"
          if ("${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
          } elseif (-not [string]::IsNullOrWhiteSpace($inputTag)) {
            $tag = $inputTag.Trim()
          } else {
            $cmake = Get-Content "${{ github.workspace }}\hlae\CMakeLists.txt" -Raw
            $major = [regex]::Match($cmake, 'set\(hlae_VERSION_MAJOR\s+([0-9]+)\)').Groups[1].Value
            $minor = [regex]::Match($cmake, 'set\(hlae_VERSION_MINOR\s+([0-9]+)\)').Groups[1].Value
            $patch = [regex]::Match($cmake, 'set\(hlae_VERSION_PATCH\s+([0-9]+)\)').Groups[1].Value

            if (-not $major -or -not $minor -or -not $patch) {
              throw "Could not resolve HLAE version from hlae/CMakeLists.txt"
            }

            $tag = "v$major.$minor.$patch"
          }

          "tag_name=$tag" >> $env:GITHUB_OUTPUT

  release:
    needs: build
    if: github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release package
        uses: actions/download-artifact@v4
        with:
          name: hlae-release-package
          path: release-assets

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.build.outputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail

          assets=(
            "release-assets/HLAE_Setup.exe"
            "release-assets/hlae.zip"
            "release-assets/hlae_pdb.zip"
          )

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" --target "${{ github.sha }}" --title "HLAE $RELEASE_TAG" --generate-notes
          fi
